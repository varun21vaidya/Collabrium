version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: collabrium-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collabrium-backend
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongodb:27017/collab-editor
      JWT_SECRET: change-me-to-a-random-secret
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data:
